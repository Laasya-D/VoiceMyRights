<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analysis Results – VoiceMyRights</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="results-container">

  <h1>Your Rights Report</h1>

  <p class="results-summary" id="resultsSummary">
    Loading your analysis…
  </p>

  <div class="score-box">
    <h2>Safety Score</h2>
    <div class="score-number" id="scoreNumber">–</div>
    <p id="riskLabel">–</p>
  </div>

  <!-- Dynamic cards injected here -->
  <div id="cardsContainer"></div>

  <div class="report-btn-container">
    <a href="report.html">
      <button id="analyzeBtn">Generate Report</button>
    </a>
  </div>

</div>

<script>
(function () {
  const raw = sessionStorage.getItem("vmrResults");

  // ── Fallback: no data yet (direct page load) ──────────────────────────────
  if (!raw) {
    document.getElementById("resultsSummary").textContent =
      "No analysis found. Go back and paste some text first.";
    document.getElementById("scoreNumber").textContent = "N/A";
    document.getElementById("riskLabel").textContent   = "";
    return;
  }

  const { riskScore, summary, redFlags, dataPrivacyConcerns, suggestions } = JSON.parse(raw);

  // ── Score ─────────────────────────────────────────────────────────────────
  document.getElementById("scoreNumber").textContent = `${100 - riskScore}/100`;
  document.getElementById("resultsSummary").textContent = summary;

  let label = "Low Risk";
  let scoreColor = "#8be29b";
  if (riskScore >= 70)      { label = "High Risk";     scoreColor = "#ff4d4d"; }
  else if (riskScore >= 40) { label = "Moderate Risk"; scoreColor = "#ffd93d"; }
  document.getElementById("riskLabel").textContent = label;
  document.getElementById("scoreNumber").style.color = scoreColor;

  // ── Cards ─────────────────────────────────────────────────────────────────
  const container = document.getElementById("cardsContainer");

  function makeCard(color, riskClass, riskLabel, emoji, title, items) {
    if (!items || items.length === 0 ||
        (items.length === 1 && items[0].toLowerCase().startsWith("no "))) return;

    const card = document.createElement("div");
    card.className = `card ${color}`;

    const tag = document.createElement("div");
    tag.className = `risk-tag ${riskClass}`;
    tag.textContent = riskLabel;
    card.appendChild(tag);

    const heading = document.createElement("h2");
    heading.textContent = `${emoji} ${title}`;
    card.appendChild(heading);

    items.forEach(item => {
      const p = document.createElement("p");
      p.textContent = item;
      card.appendChild(p);
    });

    container.appendChild(card);
  }

  makeCard("red",    "high-risk",   "HIGH RISK",   "🔴", "Red Flags",             redFlags);
  makeCard("yellow", "medium-risk", "REVIEW",       "🟡", "Data & Privacy",        dataPrivacyConcerns);
  makeCard("green",  "low-risk",    "SUGGESTIONS",  "🟢", "What You Can Do",       suggestions);
})();
</script>

</body>
</html>
