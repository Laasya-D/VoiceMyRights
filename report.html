<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>VoiceMyRights Report</title>

    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="favicon.png">

</head>

<body>

    <nav class="navbar">

    <a href="index.html" class="logo">
        Voice<span class="purple">MyRights</span>
    </a>

    <a
        href="YOUR_GITHUB_REPO_LINK"
        class="github-link"
        target="_blank">
        Source Code
    </a>

</nav>


    <body>

<div class="report-container">

    <h1>VoiceMyRights Report</h1>

    <h2>Your contract translated into plain English</h2>

    <div class="report-score">

        <h3>Risk Score</h3>

        <div class="report-number">
            0/100
        </div>

        <p id="riskText"></p>

    </div>

    <div class="top-concerns">

        <h3>Top Concerns</h3>

        <div id="pillContainer"></div>

    </div>

    <div class="summary-box">

        <h3>Summary</h3>

        <p id="summaryText"></p>

    </div>

    <div class="warning-box">

        <h3>Detected Issues</h3>

        <ul id="warningList"></ul>

    </div>

    <div class="summary-box">

        <h3>Recommendations</h3>

        <ul id="suggestionList"></ul>

    </div>

    <div class="report-actions">

        <button class="download-btn">
            Download Report
        </button>

        <button class="share-btn">
            Share Report
        </button>

    </div>

</div>

<script src="report.js"></script>

</body>

</body>

</html>
